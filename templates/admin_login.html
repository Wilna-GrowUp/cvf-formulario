{% extends "base.html" %}

{% block content %}
<div class="bloco" style="max-width: 520px; margin: 0 auto;">
    <h1>Login administrativo</h1>
    <p class="descricao">
        Acesse a área administrativa do sistema com seu usuário e senha.
    </p>

    <form method="POST">
        <div style="margin-bottom: 16px;">
            <label for="username" style="display: block; font-weight: bold; margin-bottom: 6px;">
                Usuário
            </label>
            <input
                type="text"
                id="username"
                name="username"
                required
                style="width: 100%; padding: 12px; border: 1px solid #d9dee5; border-radius: 8px;"
            >
        </div>

        <div style="margin-bottom: 20px;">
            <label for="password" style="display: block; font-weight: bold; margin-bottom: 6px;">
                Senha
            </label>
            <input
                type="password"
                id="password"
                name="password"
                required
                style="width: 100%; padding: 12px; border: 1px solid #d9dee5; border-radius: 8px;"
            >
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button type="submit" class="botao">Entrar</button>
        </div>
    </form>

    <div style="margin-top: 18px;">
        <a href="{{ url_for('admin_esqueci_senha') }}">
            Esqueci a senha
        </a>
    </div>
</div>
{% endblock %}
