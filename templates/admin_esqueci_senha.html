{% extends "base.html" %}

{% block content %}
<div class="bloco" style="max-width: 520px; margin: 0 auto;">
    <h1>Recuperar acesso</h1>
    <p class="descricao">
        Informe o usuário, o código de recuperação e defina uma nova senha.
    </p>

    <form method="POST">

        <div style="margin-bottom: 16px;">
            <label>Usuário</label>
            <input type="text" name="username" required>
        </div>

        <div style="margin-bottom: 16px;">
            <label>Código de recuperação</label>
            <input type="password" name="reset_code" required>
        </div>

        <div style="margin-bottom: 16px;">
            <label>Nova senha</label>
            <input type="password" name="nova_senha" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label>Confirmar nova senha</label>
            <input type="password" name="confirmar_senha" required>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button class="botao">Redefinir senha</button>
        </div>

    </form>

    <div style="margin-top: 16px;">
        <a href="{{ url_for('admin_login') }}">Voltar para o login</a>
    </div>
</div>
{% endblock %}
