<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ form_title }}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            color: #222;
        }

        .capa-topo {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #ffffff;
            border-bottom: 1px solid #d9dee5;
            overflow: hidden;
        }

        .capa-img-full {
            width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px 32px 16px;
        }

        .bloco {
            background-color: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 24px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .descricao {
            font-size: 16px;
            line-height: 1.7;
        }

        .consentimento-opcoes {
            display: flex;
            gap: 20px;
            margin: 16px 0 24px 0;
            flex-wrap: wrap;
        }

        .botao {
            background-color: #1f6feb;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }

        .botao:hover {
            opacity: 0.92;
        }

        .botao:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alerta {
            background-color: #ffe9e9;
            color: #a10000;
            border: 1px solid #f3b6b6;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .instrucoes ul {
            padding-left: 20px;
            line-height: 1.8;
        }

        .tabela-dimensao {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .tabela-dimensao th,
        .tabela-dimensao td {
            border: 1px solid #d9dee5;
            padding: 10px;
            vertical-align: top;
        }

        .tabela-dimensao th {
            background-color: #eef2f7;
            text-align: left;
        }

        .tabela-dimensao input[type="number"] {
            width: 100%;
            min-width: 90px;
            padding: 8px;
        }

        .resumo-somas {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            background-color: #f8fafc;
            border: 1px solid #d9dee5;
        }

        .linha-soma {
            margin-bottom: 6px;
            font-size: 15px;
        }

        .linha-soma:last-child {
            margin-bottom: 0;
        }

        .soma-ok {
            color: #0a7a28;
            font-weight: bold;
        }

        .soma-erro {
            color: #b42318;
            font-weight: bold;
        }

        .erro-dimensao {
            margin-top: 10px;
            color: #b42318;
            font-size: 14px;
            font-weight: bold;
        }

        .erro-geral-formulario {
            display: none;
            margin-bottom: 20px;
            padding: 14px;
            border-radius: 8px;
            background-color: #fff1f1;
            border: 1px solid #f1b5b5;
            color: #a10000;
            font-weight: bold;
        }

        .sucesso {
            text-align: center;
            background-color: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 10px;
            padding: 40px 24px;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 16px auto;
            }

            .bloco {
                padding: 16px;
            }

            .tabela-dimensao th,
            .tabela-dimensao td {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="capa-topo">
        <img
            src="{{ url_for('static', filename='img/capa.png') }}"
            alt="Capa do formulário"
            class="capa-img-full"
        >
    </div>

    <div class="container">
        {% with mensagens = get_flashed_messages() %}
            {% if mensagens %}
                {% for mensagem in mensagens %}
                    <div class="alerta">{{ mensagem }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
